volumes:
  cache:
    driver: local
  db-data:
    driver: local

services:
  # ===== ИЗМЕНЕНО: убрал ports, добавил networks =====
  app:
    build:
      context: .
    # container_name: currency   # <--- УБРАТЬ или ЗАКОММЕНТИРОВАТЬ (иначе нельзя масштабировать)
    depends_on:
      - db
      - kafka
      - redis
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/currency?currentSchema=currency
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=cmVkaXNwYXNzd29yZA==
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    # ports:                     # <--- УБРАТЬ или ЗАКОММЕНТИРОВАТЬ
    #   - '8080:8080'            # <--- УБРАТЬ или ЗАКОММЕНТИРОВАТЬ
    networks:
      - app-network              # <--- ДОБАВИТЬ

  # ===== НОВЫЙ СЕРВИС: NGINX как балансировщик =====
  nginx-lb:
    image: nginx:latest
    container_name: nginx-balancer
    ports:
      - "8080:80"                # <--- СЮДА ПЕРЕЕХАЛ порт 8080
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro   # <--- ДОБАВИТЬ файл nginx.conf
    depends_on:
      - app
    networks:
      - app-network              # <--- ДОБАВИТЬ

  db:
    image: postgres:16
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=currency
    volumes:
      - ./src/main/resources/db-init:/docker-entrypoint-initdb.d
    networks:
      - app-network              # <--- ДОБАВИТЬ

  redis:
    image: redis:7.2-rc-alpine
    restart: always
    container_name: redis
    ports:
      - '6379:6379'
    command: redis-server --save 20 1 --loglevel warning --requirepass cmVkaXNwYXNzd29yZA==
    volumes:
      - cache:/data
    networks:
      - app-network              # <--- ДОБАВИТЬ

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network              # <--- ДОБАВИТЬ

  kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    depends_on:
      - zookeeper
    networks:
      - app-network              # <--- ДОБАВИТЬ

# ===== НОВАЯ СЕТЬ =====
networks:
  app-network:
    driver: bridge